version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hardcover
    binary: hardcover
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/KIRKR101/hardcover-cli/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - 386
      - arm
    goarm:
      - 6
      - 7
    ignore:
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: 386
      - goos: freebsd
        goarch: arm
      - goos: windows
        goarch: arm

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: hardcover
    repository:
      owner: KIRKR101
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/KIRKR101/hardcover-cli"
    description: "CLI for Hardcover reading tracker"
    license: "MIT"
    install: |
      bin.install "hardcover"
    test: |
      system "#{bin}/hardcover", "--version"
