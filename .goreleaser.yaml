version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: hardcover
    binary: hardcover
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: hardcover
    repository:
      owner: KIRKR101
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/KIRKR101/hardcover-cli"
    description: "CLI for Hardcover reading tracker"
    license: "MIT"
    install: |
      bin.install "hardcover"
    test: |
      system "#{bin}/hardcover", "--version"
